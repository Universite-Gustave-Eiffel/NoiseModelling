<!DOCTYPE html>
<html lang="en">
<head>
    <title th:text="${version}">NoiseModelling</title>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" type="text/css" href="dist/wps-gui.css" />
    <link rel="stylesheet" href="components/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="components/jquery-ui/themes/flick/jquery-ui.css" />
    <link rel="stylesheet" href="components/font-awesome/css/all.min.css" />
    <link rel="stylesheet" href="components/font-awesome/css/v4-shims.min.css" />
    <link rel="stylesheet" type="text/css" href="dist/themes/coloringnoise/style.css" />
</head>
<body>
<div class="navbar navbar-inverse navbar-fixed-top">
    <div class="navbar-inner">
        <div class="container-fluid">
            <a id="header" class="brand" href="#"></a>
            <div class="btn-group">
                <button class="btn btn-default dropdown-toggle" type="button" id="dropdownMenu1"
                        data-toggle="dropdown">
                    <i class="fa fa-file fa-fw"></i>File <span class="caret"></span>
                </button>
                <ul class="wpsgui dropdown-menu" role="menu" aria-labelledby="dropdownMenu1">
                    <li role="presentation"><a role="menuitem" id="open-project" tabindex="-1"
                                               href="#"><i class="fa fa-folder-open fa-fw"></i>Open project</a></li>
                    <li role="presentation"><a role="menuitem" id="save-project" tabindex="-1"
                                               href="#"><i class="fa fa-download fa-fw"></i>Save project</a></li>
                    <li role="presentation" class="divider"></li>
                    <li role="presentation"><a role="menuitem" id="open-project-db" tabindex="-1"
                                               href="#"><i class="fa fa-database fa-fw"></i>Open project with database</a></li>
                    <li role="presentation"><a role="menuitem" id="save-project-db" tabindex="-1"
                                               href="#"><i class="fa fa-database fa-fw"></i>Save project with database</a></li>
                </ul>
            </div>
            <div class="btn-group btn-clear-div">
                <button id="btn-clear" type="button" class="btn btn-default"><i
                        class="fa fa-eraser fa-fw"></i>Clear</button>
            </div>
            <div class="btn-group btn-clear-div">
                <button id="btn-help" type="button" class="btn btn-default" onclick="window.open('/help/index.html');" ><i class="fa fa-circle-question fa-fw"></i>Help</button>
            </div>
            <div class="btn-group btn-clear-div">
                <button id="btn-manage" type="button" class="btn btn-default" onclick="window.open('../', '_blank')"><i
                        class="fa fa-gear fa-fw"
                ></i>Manage</button>
            </div>

            <span class="open-success">Loaded successfully</span>
            <span class="save-success">Saved successfully</span>
            <div class="btn-group pull-right">
                <button id="btn-run-process" type="button" class="btn btn-success"><i
                        class="fa fa-play fa-fw"></i>Run Process</button>
            </div>
        </div>
    </div>
</div>
<div id="main-container">
    <div id="palette">
        <div class="palette-scroll" style="display:block;"></div>
        <div id="palette-search" style="display:block;">
            <i class="glyphicon glyphicon-search"></i><input id="palette-search-input" type="text"
                                                             placeholder="filter" /><a href="#" id="palette-search-clear"><i
                class="glyphicon glyphicon-remove"></i></a>
        </div>
    </div>
    <div id="workspace">
        <ul id="workspace-tabs" class="red-ui-tabs">
            <li class="red-ui-tab active" style="width: 100px"><a href="#chart"
                                                                  class="red-ui-tab-label" title="Builder">Builder</a></li>
            <li class="red-ui-tab" style="width: 100px"><a href="#tab-xml" class="red-ui-tab-label"
                                                           title="Python">Python</a></li>
        </ul>
        <div id="workspace-add-tab"><span id="btn-workspace-add-tab"></span></div>
        <div id="workspace-content">
            <div id="chart" class="ui-droppable"></div>
            <div id="tab-xml" style="display:none"><pre><code class="python">Please run a WPS script a first time in order to generate the corresponding Python code</code></pre>
                <button onclick="copyToClipboard()">Copy Code</button>
            </div>
        </div>
    </div>
    <div id="chart-zoom-controls">
        <div class="btn-group">
            <a class="btn btn-mini" title="Zoom out" id="btn-zoom-out" href="#"><i class="glyphicon glyphicon-zoom-out"
            ></i></a>
            <a class="btn btn-mini" title="Reset zoom" id="btn-zoom-zero" href="#"><i class="glyphicon glyphicon-th"
            ></i></a>
            <a class="btn btn-mini" title="Zoom in" id="btn-zoom-in" href="#"><i class="glyphicon glyphicon-zoom-in"
            ></i></a>
        </div>
    </div>
    <div id="sidebar">
        <ul id="sidebar-tabs" class="red-ui-tabs">
            <li class="red-ui-tab active" style="width:46%"><a href="#tab-inputs"
                                                               class="red-ui-tab-label" title="Inputs">Inputs</a></li>
            <li class="red-ui-tab" style="width:46%"><a href="#tab-results" class="red-ui-tab-label"
                                                        title="Console">Console</a></li>
        </ul>
        <div id="sidebar-content">
            <div id="tab-inputs"></div>
            <div id="tab-results" style="display:none"></div>
        </div>
    </div>
    <div id="sidebar-separator"></div>
</div>

<div id="dialog" class="hide"><form id="dialog-form" class="form-horizontal"></form></div>

<script src="vendor/ol.js"></script>
<script src="components/jszip/jszip.min.js"></script>
<script src="dist/wps-gui.js"></script>
<script>

    async function copyToClipboard() {
        // Get the text content from the pre/code block
        var codeElement = document.querySelector('#tab-xml pre code');
        var codeText = codeElement.textContent;
        await navigator.clipboard.writeText(codeText);
    }
    var url = 'ows';
    var wpsclient = new wps.client({
        servers: {
            'wpsgui': url
        }
    });
    var wpsui;
    wpsclient.getGroupedProcesses('wpsgui', function(groups) {
        wpsui = new wps.ui({
            client: wpsclient,
            defaultServer: 'wpsgui',
            getVectorLayers: true,
            parentContainer: $('.palette-scroll'),
            dropZone: $("#chart")
        });

        // Sort groups alphabetically
        const sortedGroups = Object.keys(groups).sort();
        for (let group of sortedGroups) {
            let content = wpsui.createProcessCategory(group);
            // Sort processes alphabetically by identifier.value
            groups[group].sort((a, b) => {
                const idA = a.value.identifier.value.toUpperCase();
                const idB = b.value.identifier.value.toUpperCase();
                return idA.localeCompare(idB);
            });
            for (let i=0, ii=groups[group].length; i<ii; ++i) {
                $(content).append(wpsui.createProcess(groups[group][i]));
            }
        }

        // Auto-load project from browser storage on startup
        wps.ui.load(wpsui);
        // Hide the notification for auto-load
        $('.open-success').stop(true, true).hide();
    });
</script>
</body>
</html>
