name: Reusable Windows Build

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'The git ref to checkout'
        required: true
        type: string
      use_snapshots:
        description: 'Enable the Maven profile use-snapshots (set false to disable - used for releases)'
        required: false
        type: boolean
        default: true
      run_unit_tests:
        description: 'Run Maven unit tests'
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      git_ref:
        description: 'The git ref to checkout'
        required: true
        type: string
      use_snapshots:
        description: 'Enable the Maven profile use-snapshots (set false to disable - used for releases)'
        required: false
        type: boolean
        default: true
      run_unit_tests:
        description: 'Run Maven unit tests'
        required: false
        type: boolean
        default: true
    outputs:
      # Tier 3: Map Workflow Output -> Job Output
      installer_name:
        description: "The filename of the generated EXE"
        value: ${{ jobs.build.outputs.exe_name }} # MUST reference jobs, not steps

jobs:
  build:
    runs-on: windows-latest
    outputs:
      exe_name: ${{ steps.version_step.outputs.EXE_NAME }}
    steps:
      # Checkout the source code of the project
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            $HOME/.m2/
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
      # Setup the jdk using version 11 of Adoptium Temurin
      - name: Setup java 25 using Adoptium Temurin
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Building
        shell: pwsh
        env:
          MAVEN_PROFILE: ${{ inputs.use_snapshots && '-Puse-snapshots' || '' }}
          # If run_unit_tests is false, add the skip flag
          SKIP_TESTS: ${{ inputs.run_unit_tests == false && '-DskipTests' || '' }}
        run: |
          # Note: 'install' automatically runs tests unless -DskipTests is provided
          mvn install javadoc:test-javadoc javadoc:jar package -B $env:MAVEN_PROFILE $env:SKIP_TESTS
      - name: Extract packaged zip with windows
        run: |
          unzip -o noisemodelling-scripts/target/*.zip -d NoiseModelling
      - name: Find extracted folder (PowerShell)
        id: folder
        shell: pwsh
        run: |
          $subdir = Get-ChildItem -Path NoiseModelling -Directory | Select-Object -First 1
          echo "folder=$($subdir.FullName)" >> $env:GITHUB_OUTPUT
      - name: Integration test, use ScriptRunner to import a shapefile into the database
        run: |
          bin\ScriptRunner -w ./ -s scripts/Import_and_Export/Import_File.groovy --pathFile resources/ground_type.shp
        working-directory: ${{ steps.folder.outputs.folder }}
      - name: Fetch versions for NSIS executable metadata
        id: version_step
        run: |
          $mavenVersion = (Select-String -Path "pom.xml" -Pattern "<version>([^<]+)</version>" | Select-Object -First 1).Matches.Groups[1].Value
          echo "MAVEN_VERSION=$mavenVersion" >> $env:GITHUB_ENV
          echo "EXE_NAME=NoiseModelling-$mavenVersion-Setup.exe" >> $env:GITHUB_OUTPUT
          # Derive 4-part numeric version for Windows EXE metadata (e.g. 5.0.2-SNAPSHOT -> 5.0.2.0)
          $numericVersion = $mavenVersion -replace '-.*', ''
          $parts = $numericVersion.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $winVersion = ($parts[0..3]) -join '.'
          echo "APP_VERSION=$winVersion" >> $env:GITHUB_ENV
          echo "APP_VERSION_TXT=$mavenVersion" >> $env:GITHUB_ENV
      - name: Extract NoiseModelling packaged ZIP to NSIS installer folder
        run: |
          $zip = Get-ChildItem noisemodelling-scripts\target\*.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath extracted_raw -Force
          $innerDir = (Get-ChildItem extracted_raw | Where-Object PSIsContainer | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force -Path installer\app
          Copy-Item -Recurse "$innerDir\*" installer\app
      - name: Debug unzipped contents
        run: |
          dir installer
          dir installer\app\bin
      - name: Download Windows JRE (Adoptium)
        run: |
          $jreUrl = "https://api.adoptium.net/v3/binary/latest/25/ga/windows/x64/jre/hotspot/normal/eclipse"
          Invoke-WebRequest -Uri $jreUrl -OutFile jre.zip
          Expand-Archive -Path jre.zip -DestinationPath jre_raw -Force
          $innerDir = (Get-ChildItem jre_raw | Where-Object PSIsContainer | Select-Object -First 1).FullName
          Move-Item "$innerDir" installer\jre         

      - name: Install Launch4j
        run: choco install launch4j --yes --no-progress

      - name: Build EXE config
        run: |
          (Get-Content installer\launch4j-config.xml) `
            -replace 'APP_VERSION_PLACEHOLDER', $env:APP_VERSION `
            -replace 'APP_VERSION_TXT_PLACEHOLDER', $env:APP_VERSION_TXT `
          | Set-Content installer\launch4j-config-final.xml


      - name: Create EXE
        run: |
          java -jar "C:\Program Files (x86)\Launch4j\launch4j.jar" installer\launch4j-config-final.xml

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_VERSION=$env:APP_VERSION /DMAVEN_VERSION=$env:MAVEN_VERSION installer\installer.nsi

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer\NoiseModelling-${{ env.MAVEN_VERSION }}-Setup.exe
