name: CI + Windows Installer

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: imresamu/postgis:17-3.5
        env:
          POSTGRES_USER: noisemodelling
          POSTGRES_PASSWORD: noisemodelling
          POSTGRES_DB: noisemodelling_db
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build Maven
        run: mvn clean test package -B
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: noisemodelling_db
          POSTGRES_USER: noisemodelling
          POSTGRES_PASSWORD: noisemodelling

      - name: Install bsdtar
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Extract ZIP artifact
        run: |
          mkdir NoiseModelling
          bsdtar -xvf noisemodelling-scripts/target/*.zip --strip-components=1 -C NoiseModelling

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-linux
          path: NoiseModelling/

      - name: Upload ZIP for Windows job
        uses: actions/upload-artifact@v4
        with:
          name: dist-zip
          path: noisemodelling-scripts/target/*.zip


  windows-installer:
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set version
        run: |
          echo "APP_VERSION=0.0.0-${{ github.run_number }}-${{ github.sha }}" >> $env:GITHUB_ENV

      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: dist-zip
          path: dist

      - name: Extract ZIP
        run: |
          Expand-Archive -Path "dist\*.zip" -DestinationPath extracted -Force

      - name: Find JAR
        run: |
          $jar = Get-ChildItem -Recurse -Path extracted -Filter *.jar |
                 Sort-Object Length -Descending |
                 Select-Object -First 1
          echo "JAR_PATH=$($jar.FullName)" >> $env:GITHUB_ENV

      - name: Install Launch4j
        run: choco install launch4j --yes --no-progress

      - name: Build EXE config
        run: |
          (Get-Content installer\launch4j-config.xml) `
            -replace 'JAR_PLACEHOLDER', $env:JAR_PATH `
            -replace '1.0.0.0', $env:APP_VERSION `
          | Set-Content installer\launch4j-config-final.xml

      - name: Create EXE
        run: |
          java -jar "C:\Program Files (x86)\Launch4j\launch4j.jar" installer\launch4j-config-final.xml
      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Build installer
        run: |
          makensis /DAPP_VERSION=$env:APP_VERSION installer\installer.nsi


      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer\NoiseModelling-Setup.exe
