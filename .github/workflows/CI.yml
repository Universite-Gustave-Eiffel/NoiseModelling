name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
jobs:
  build_linux:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: imresamu/postgis:17-3.5
        env:
          # must specify password for PG Docker container image, see: https://registry.hub.docker.com/_/postgres?tab=description&page=1&name=10
          POSTGRES_USER: noisemodelling
          POSTGRES_PASSWORD: noisemodelling
          POSTGRES_DB: noisemodelling_db
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            $HOME/.m2/
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
      # Checkout the source code of the project
      - name: Checkout
        uses: actions/checkout@v4
      # Setup the jdk using version 11 of Adoptium Temurin
      - name: Setup java 11 using Adoptium Temurin
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Building
        run: mvn test install javadoc:test-javadoc javadoc:jar package -B
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: noisemodelling_db
          POSTGRES_USER: noisemodelling
          POSTGRES_PASSWORD: noisemodelling
      - name: Maven Deploy
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        if: ${{ (env.MAVEN_USERNAME != null) && (github.ref == 'refs/heads/main') }}
        run: mvn clean deploy -B
      - name: Install bsdtar
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools
      - name: Unzip production artifacts
        run: |
          mkdir NoiseModelling
          # bsdtar handles .zip and supports --strip-components
          bsdtar -xvf noisemodelling-scripts/target/*.zip --strip-components=1 -C NoiseModelling
      - name: Generate Sanitized Artifact Name
        id: sanitize
        run: |
          # Determine the raw value (Ref name if not default branch, otherwise SHA)
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
          RAW_VAL="${{ github.ref_name }}"
          else
          RAW_VAL="${{ github.sha }}"
          fi
          
          # Use sed to perform replacements:
          # 1. / and \ become _
          # 2. : is removed
          # 3. * becomes x
          CLEAN_VAL=$(echo "$RAW_VAL" | sed 's/[\/\\]/_/g; s/://g; s/\*/x/g')
          
          # Set it as an environment variable for the next step
          echo "ARTIFACT_NAME=NoiseModelling-$CLEAN_VAL" >> $GITHUB_ENV
      - name: Upload distribution file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: NoiseModelling/
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            $HOME/.m2/
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}
      # Checkout the source code of the project
      - name: Checkout
        uses: actions/checkout@v4
      # Setup the jdk using version 11 of Adoptium Temurin
      - name: Setup java 11 using Adoptium Temurin
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Building
        run: mvn test install javadoc:test-javadoc javadoc:jar package -B
      - name: Extract packaged zip with windows
        run: |
          unzip -o noisemodelling-scripts/target/*.zip -d NoiseModelling
      - name: Find extracted folder (PowerShell)
        id: folder
        shell: pwsh
        run: |
          $subdir = Get-ChildItem -Path NoiseModelling -Directory | Select-Object -First 1
          echo "folder=$($subdir.FullName)" >> $env:GITHUB_OUTPUT
      - name: Integration test, use ScriptRunner to import a shapefile into the database
        run: |
          bin\ScriptRunner -w ./ -s scripts/Import_and_Export/Import_File.groovy --pathFile resources/ground_type.shp
        working-directory: ${{ steps.folder.outputs.folder }}
      - name: Fetch versions for NSIS executable metadata
        run: |
          $mavenVersion = (Select-String -Path "pom.xml" -Pattern "<version>([^<]+)</version>" | Select-Object -First 1).Matches.Groups[1].Value
          echo "MAVEN_VERSION=$mavenVersion" >> $env:GITHUB_ENV
          # Derive 4-part numeric version for Windows EXE metadata (e.g. 5.0.2-SNAPSHOT -> 5.0.2.0)
          $numericVersion = $mavenVersion -replace '-.*', ''
          $parts = $numericVersion.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $winVersion = ($parts[0..3]) -join '.'
          echo "APP_VERSION=$winVersion" >> $env:GITHUB_ENV
          echo "APP_VERSION_TXT=$mavenVersion" >> $env:GITHUB_ENV
      - name: Extract NoiseModelling packaged ZIP to NSIS installer folder
        run: |
          $zip = Get-ChildItem noisemodelling-scripts\target\*.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath extracted_raw -Force
          $innerDir = (Get-ChildItem extracted_raw | Where-Object PSIsContainer | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force -Path installer\app
          Copy-Item -Recurse "$innerDir\*" installer\app
      - name: Debug unzipped contents
        run: |
          dir installer
          dir installer\app\bin
      - name: Download Windows JRE (Adoptium)
        run: |
          $jreUrl = "https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse"
          Invoke-WebRequest -Uri $jreUrl -OutFile jre.zip
          Expand-Archive -Path jre.zip -DestinationPath jre_raw -Force
          $innerDir = (Get-ChildItem jre_raw | Where-Object PSIsContainer | Select-Object -First 1).FullName
          Move-Item "$innerDir" installer\jre         

      - name: Install Launch4j
        run: choco install launch4j --yes --no-progress

      - name: Build EXE config
        run: |
          (Get-Content installer\launch4j-config.xml) `
            -replace 'APP_VERSION_PLACEHOLDER', $env:APP_VERSION `
            -replace 'APP_VERSION_TXT_PLACEHOLDER', $env:APP_VERSION_TXT `
          | Set-Content installer\launch4j-config-final.xml


      - name: Create EXE
        run: |
          java -jar "C:\Program Files (x86)\Launch4j\launch4j.jar" installer\launch4j-config-final.xml

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_VERSION=$env:APP_VERSION /DMAVEN_VERSION=$env:MAVEN_VERSION installer\installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer\NoiseModelling-${{ env.MAVEN_VERSION }}-Setup.exe
          compression-level: 0
